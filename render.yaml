services:
  - type: web
    name: letsappli-api
    env: python
    plan: free
    buildCommand: |
      pip install -r requirements-dev.txt
      python -m playwright install chromium
    startCommand: uvicorn bridge_server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://your-vercel-app.vercel.app
